services:
  db:
    image: postgres:16-alpine
    container_name: boedepos_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "3302:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - boedepos_net

  app:
    build: .
    image: boedee_api
    container_name: boedepos_app
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "1001:1001"
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env
    networks:
      - boedepos_net

networks:
  boedepos_net:
    driver: bridge

volumes:
  pgdata:
